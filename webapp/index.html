<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Quiz Bot — Викторина</title>
    <link rel="stylesheet" href="style.css" />
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div id="app">
        <!-- Start Screen -->
        <div id="screen-start" class="screen active">
            <div class="start-content">
                <div class="logo">🧠</div>
                <h1>Quiz Bot</h1>
                <p class="subtitle">Проверь свои знания!</p>
                <div class="topics">
                    <span class="topic">🧪 Наука</span>
                    <span class="topic">📜 История</span>
                    <span class="topic">🌍 География</span>
                    <span class="topic">💻 Технологии</span>
                </div>
                <button id="btn-start" class="btn btn-primary">Начать викторину 🚀</button>
            </div>
        </div>

        <!-- Quiz Screen -->
        <div id="screen-quiz" class="screen">
            <div class="quiz-header">
                <div class="progress-info">
                    <span id="question-counter">1 / 12</span>
                </div>
                <div class="progress-bar-container">
                    <div id="progress-bar" class="progress-bar"></div>
                </div>
            </div>
            <div id="question-container" class="question-container">
                <h2 id="question-text" class="question-text"></h2>
                <div id="answers" class="answers"></div>
            </div>
        </div>

        <!-- Result Screen -->
        <div id="screen-result" class="screen">
            <div class="result-content">
                <div id="result-emoji" class="result-emoji">🏆</div>
                <h1 id="result-title" class="result-title">Отлично!</h1>
                <div class="result-score">
                    <span id="result-score-num">0</span>
                    <span class="result-total">/ <span id="result-total-num">12</span></span>
                </div>
                <div class="result-percent-container">
                    <div class="result-percent-ring">
                        <svg viewBox="0 0 120 120">
                            <circle cx="60" cy="60" r="54" fill="none" stroke="var(--tg-theme-secondary-bg-color, #2b2b2b)" stroke-width="8"/>
                            <circle id="result-ring" cx="60" cy="60" r="54" fill="none" stroke="var(--tg-theme-button-color, #8774e1)" stroke-width="8"
                                stroke-linecap="round" stroke-dasharray="339.292" stroke-dashoffset="339.292" transform="rotate(-90 60 60)"/>
                        </svg>
                        <span id="result-percent-text" class="result-percent-text">0%</span>
                    </div>
                </div>
                <p id="result-message" class="result-message"></p>
                <div class="result-buttons">
                    <button id="btn-retry" class="btn btn-primary">🔄 Попробовать снова</button>
                    <button id="btn-share" class="btn btn-secondary">📤 Поделиться</button>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
