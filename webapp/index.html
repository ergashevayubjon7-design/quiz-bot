<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Quiz Bot — Викторина</title>
    <link rel="stylesheet" href="style.css" />
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div id="app">
        <!-- Start Screen -->
        <div id="screen-start" class="screen active">
            <div class="start-content">
                <div class="logo">🧠</div>
                <h1>Quiz Bot</h1>
                <p id="start-subtitle" class="subtitle">Проверь свои знания!</p>
                <div class="topics">
                    <span class="topic">🧪 Наука</span>
                    <span class="topic">📜 История</span>
                    <span class="topic">🌍 География</span>
                    <span class="topic">💻 Технологии</span>
                </div>
                <button id="btn-start" class="btn btn-primary">Начать викторину 🚀</button>
            </div>
        </div>

        <!-- Quiz Screen (regular) -->
        <div id="screen-quiz" class="screen">
            <div class="quiz-header">
                <div class="progress-info">
                    <span id="question-counter">1 / 12</span>
                    <span id="score-display" class="score-display">⭐ 0</span>
                </div>
                <div class="progress-bar-container">
                    <div id="progress-bar" class="progress-bar"></div>
                </div>
            </div>
            <div id="question-container" class="question-container">
                <h2 id="question-text" class="question-text"></h2>
                <div id="answers" class="answers"></div>
            </div>
        </div>

        <!-- Prize Quiz Screen -->
        <div id="screen-prize-quiz" class="screen">
            <div class="quiz-header">
                <div class="progress-info">
                    <span id="prize-question-counter">1 / 10</span>
                    <span id="prize-level-label" class="prize-level">УРОВЕНЬ 1</span>
                </div>
                <div class="progress-bar-container">
                    <div id="prize-progress-bar" class="progress-bar prize-progress"></div>
                </div>
            </div>
            <div class="prize-badge">🏆 Призовая игра</div>
            <div id="prize-question-container" class="question-container">
                <h2 id="prize-question-text" class="question-text"></h2>
                <div id="prize-answers" class="answers"></div>
            </div>
        </div>

        <!-- Regular Result Screen -->
        <div id="screen-result" class="screen">
            <div class="result-content">
                <div id="result-emoji" class="result-emoji">🏆</div>
                <h1 id="result-title" class="result-title">Отлично!</h1>
                <div class="result-score">
                    <span id="result-score-num" class="result-score-num">0</span>
                    <span class="result-total">/ <span id="result-total-num">12</span></span>
                </div>
                <div class="result-percent-container">
                    <div class="result-percent-ring">
                        <svg viewBox="0 0 120 120">
                            <circle cx="60" cy="60" r="54" fill="none" stroke="var(--tg-theme-secondary-bg-color, #2b2b2b)" stroke-width="8"/>
                            <circle id="result-ring" cx="60" cy="60" r="54" fill="none" stroke="var(--tg-theme-button-color, #8774e1)" stroke-width="8"
                                stroke-linecap="round" stroke-dasharray="339.292" stroke-dashoffset="339.292" transform="rotate(-90 60 60)"/>
                        </svg>
                        <span id="result-percent-text" class="result-percent-text">0%</span>
                    </div>
                </div>
                <p id="result-message" class="result-message"></p>
                <div class="result-buttons">
                    <button id="btn-retry" class="btn btn-primary">🔄 Попробовать снова</button>
                    <button id="btn-share" class="btn btn-secondary">📤 Поделиться</button>
                </div>
            </div>
        </div>

        <!-- Prize Result Screen -->
        <div id="screen-prize-result" class="screen">
            <div class="prize-result-content">
                <div class="prize-result-glow">🏆</div>
                <h1 class="prize-result-title">Призовая игра</h1>
                <div class="prize-final-score">
                    <span class="prize-final-big" id="prize-final-score">0</span>
                    <span class="prize-final-divider">/</span>
                    <span class="prize-final-total" id="prize-final-total">10</span>
                </div>
                <div class="prize-final-meter">
                    <div class="prize-final-fill" id="prize-final-fill"></div>
                </div>
                <p class="prize-final-label" id="prize-final-label">Неплохо! Попробуй ещё!</p>
                <div class="prize-final-detail">
                    <p>Твой результат отправлен в бот.</p>
                    <p>Если ты в топ-3 — получишь приз! 🎁</p>
                </div>
                <button id="btn-prize-close" class="btn btn-primary">✅ Готово</button>
            </div>
        </div>

        <!-- Level Complete Overlay -->
        <div id="level-complete" class="level-overlay" style="display:none">
            <div class="level-overlay-content">
                <div class="level-emoji" id="level-emoji">✅</div>
                <div class="level-text" id="level-text">Верно!</div>
                <div class="level-sub" id="level-sub">+1 балл</div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
